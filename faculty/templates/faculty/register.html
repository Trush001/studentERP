{% extends 'core/base.html' %}

{% block title %}Faculty ERP | Faculty Registration{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-4 py-12">
    <div class="w-full max-w-2xl">
        <div class="glass p-8 sm:p-10 rounded-2xl shadow-xl animate-fade-in border border-white/50">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-100 text-brand-600 mb-6 shadow-sm">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Faculty Registration</h1>
                <p class="mt-2 text-sm text-gray-600">Create your faculty account to manage students and courses.</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="fullname" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required 
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all sm:text-sm">
                    </div>
                    
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="username" name="username" required 
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all sm:text-sm">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="email" name="email" required 
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all sm:text-sm">
                    </div>

                    <div>
                        <label for="mobile" class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
                        <input type="tel" id="mobile" name="mobile" required 
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all sm:text-sm">
                    </div>
                    
                    <div class="md:col-span-2">
                        <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Primary Subject/Department</label>
                        <input type="text" id="subject" name="subject" required 
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all sm:text-sm">
                    </div>

                    <div class="md:col-span-2">
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required 
                            class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all sm:text-sm">
                    </div>
                </div>
                
                <div class="pt-4">
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-brand-600 hover:bg-brand-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all transform hover:-translate-y-0.5">
                        Register as Faculty
                    </button>
                </div>
            </form>
            
            <div class="mt-8 pt-6 border-t border-gray-200/50">
                <div class="text-sm text-center text-gray-600 space-y-2">
                    <p>Already have an account? <a href="{% url 'login' %}" class="font-semibold text-brand-600 hover:text-brand-500 hover:underline transition-colors">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
