{% extends 'core/base.html' %}

{% block title %}Student ERP | Verify OTP{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="glass p-8 sm:p-10 rounded-2xl shadow-xl animate-fade-in border border-white/50">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-redlight-100 text-redlight-600 mb-6 shadow-sm">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Verify Your Email</h1>
                <p class="mt-2 text-sm text-gray-600">Please enter the 6-digit OTP sent to your email.</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="otp" class="block text-sm font-medium text-gray-700 mb-1 text-center">OTP Code</label>
                    <input type="text" id="otp" name="otp" required maxlength="6" pattern="\d{6}" placeholder="------" 
                        class="block w-full px-4 py-3 text-center tracking-[0.5em] text-2xl font-bold rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-redlight-500 focus:border-redlight-500 transition-all">
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-redlight-600 hover:bg-redlight-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-redlight-500 transition-all transform hover:-translate-y-0.5">
                        Verify OTP
                    </button>
                </div>
            </form>
            
            <div class="mt-8 pt-6 border-t border-gray-200/50">
                <div class="text-sm text-center text-gray-600 space-y-2">
                    <p>Didn't receive the code? <a href="{% url 'login' %}" class="font-semibold text-redlight-600 hover:text-redlight-500 hover:underline transition-colors">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
