{% extends 'core/base.html' %}

{% block title %}Student ERP | Login{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="glass p-8 sm:p-10 rounded-2xl shadow-xl animate-fade-in border border-white/50">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-redlight-100 text-redlight-600 mb-6 shadow-sm">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Welcome Back</h1>
                <p class="mt-2 text-sm text-gray-600">Please enter your credentials to login to your account.</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" 
                        class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-redlight-500 focus:border-redlight-500 transition-all sm:text-sm">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" 
                        class="block w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:bg-white text-gray-900 focus:ring-2 focus:ring-redlight-500 focus:border-redlight-500 transition-all sm:text-sm">
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-redlight-600 hover:bg-redlight-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-redlight-500 transition-all transform hover:-translate-y-0.5">
                        Sign In
                    </button>
                </div>
            </form>
            
            <div class="mt-8 pt-6 border-t border-gray-200/50">
                <div class="text-sm text-center text-gray-600 space-y-2">
                    <p>Are you a student? <a href="{% url 'student_register' %}" class="font-semibold text-redlight-600 hover:text-redlight-500 hover:underline transition-colors">Register here</a></p>
                    <p>Are you a faculty? <a href="{% url 'faculty_register' %}" class="font-semibold text-redlight-600 hover:text-redlight-500 hover:underline transition-colors">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
